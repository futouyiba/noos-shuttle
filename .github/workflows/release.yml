name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release packages
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Hub dependencies
        run: npm --prefix apps/noos-hub ci

      - name: Verify
        run: |
          npm run typecheck
          npm test
          bash -n scripts/noos-install.sh
          bash -n scripts/noos-doctor.sh
          bash -n scripts/package-extension.sh
          bash -n scripts/package-release-artifacts.sh

      - name: Package extension and NOOS skills
        run: npm run package:release

      - name: Package NOOS Hub for macOS
        run: |
          npm run hub:bundle
          mkdir -p release
          VERSION="$(node -p "require('./package.json').version")"
          find apps/noos-hub/src-tauri/target/release/bundle -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" \) \
            -print0 | while IFS= read -r -d '' artifact; do
              ext="${artifact##*.}"
              case "$artifact" in
                *.app.tar.gz) ext="app.tar.gz" ;;
              esac
              cp "$artifact" "release/noos-hub-macos-$VERSION-$RUNNER_ARCH.$ext"
            done

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" release/* --generate-notes
          fi
